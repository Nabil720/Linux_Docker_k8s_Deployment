apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-service
  labels:
    app: student-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-service
  template:
    metadata:
      labels:
        app: student-service
    spec:
      containers:
      - name: student-service
        image: nanil0034/kindergarten-registry-student:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: VAULT_SKIP_VERIFY
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  selector:
    app: student-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP